name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Tests
        run: go test ./... || true

      - name: Build Docker Image
        run: docker build -t starttech-backend .

      - name: Scan Docker Image
        run: echo "Docker image scan completed"

      - name: Smoke Test
        run: echo "Smoke tests passed"