name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Client

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test -- --watchAll=false || true

      - name: Build React Application
        run: npm run build

      - name: Run Security Audit
        run: npm audit --audit-level=high || true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy to S3
        run: |
          echo "Syncing frontend build files to S3 bucket..."
          aws s3 sync build/ s3://starttech-frontend-bucket-demo

      - name: Invalidate CloudFront Cache
        run: |
          echo "Invalidating CloudFront distribution cache..."
          aws cloudfront create-invalidation \
            --distribution-id EXAMPLE123 \
            --paths "/*"

      - name: Deployment Notification
        run: echo "Frontend deployment completed successfully."